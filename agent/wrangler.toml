name = "david-ho-interview-agent"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace for question logging
# Run once to create: npx wrangler kv:namespace create QUESTION_LOGS
# Then paste the returned id below
[[kv_namespaces]]
binding = "QUESTION_LOGS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Secrets — set via CLI (never put real values here):
# npx wrangler secret put ANTHROPIC_API_KEY
# npx wrangler secret put ADMIN_SECRET   ← pick any private password
